<!-- ===== BOOKING ===== -->

        </div>
        <div class="form-group">

        </div>
      </div>

        <div class="form-group">
          <label id="lbl-phone"></label>

      </div>
      <div class="form-row">
        <div class="form-group">
          <label id="lbl-type"></label>
          <select id="f-type"><option id="f-type-ph" value=""></option></select>
        </div>
        <div class="form-group">

        <div class="form-group">
          <label id="lbl-location"></label>

        </div>

<!-- ===== PACKAGES ===== -->

  <div class="sec-title" id="sec-pkg-title"></div>

<!-- ===== GALLERY ===== -->

  <div class="sec-sub" id="sec-gal-sub"></div>
  <div class="title-line"></div>
  <div class="gallery-grid" id="gallery-grid"></div>
</section>

<!-- ===== LOCATIONS ===== -->
<section class="section section-bg" id="locations">
  <div class="sec-label" id="sec-loc-label"></div>
  <div class="sec-title" id="sec-loc-title"></div>
  <div class="sec-sub" id="sec-loc-sub"></div>
  <div class="title-line"></div>

</section>

<!-- ===== CONTACT ===== -->

</section>

<!-- ===== FOOTER ===== -->
<footer>
  <div class="footer-brand" id="footer-brand">ጄሪ ኢቨንት ኦርጋናይዘርስ</div>
  <p id="footer-copy"></p>
</footer>

<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="js/data.js"></script>
<script>
// ============================================================
// RENDER ENGINE — redraws everything when language switches
// ============================================================
function renderAll() {
  // Navbar
  document.getElementById('nl-services').textContent   = t('nav_services');
  document.getElementById('nl-packages').textContent   = t('nav_packages');
  document.getElementById('nl-gallery').textContent    = t('nav_gallery');
  document.getElementById('nl-locations').textContent  = t('nav_locations');
  document.getElementById('nl-contact').textContent    = t('nav_contact');
  document.getElementById('nl-book').textContent       = t('nav_book');
  document.getElementById('lang-btn').textContent      = t('lang_switch');

  // Hero
  document.getElementById('hero-eyebrow').textContent = t('hero_eyebrow');
  document.getElementById('hero-h1').innerHTML =
    `${t('hero_title')} <span class="accent">${t('hero_title_accent')}</span> ${t('hero_title2')}`;
  document.getElementById('hero-p').textContent  = t('hero_sub');
  document.getElementById('hero-btn1').textContent = t('hero_btn1');
  document.getElementById('hero-btn2').textContent = t('hero_btn2');
  document.getElementById('s1n').textContent = t('stat1_num');
  document.getElementById('s1l').textContent = t('stat1_label');
  document.getElementById('s2n').textContent = t('stat2_num');
  document.getElementById('s2l').textContent = t('stat2_label');
  document.getElementById('s3n').textContent = t('stat3_num');
  document.getElementById('s3l').textContent = t('stat3_label');

  // Services section labels
  document.getElementById('sec-services-label').textContent = t('services_label');
  document.getElementById('sec-services-title').textContent = t('services_title');
  document.getElementById('sec-services-sub').textContent   = t('services_sub');

  // Services grid
  const svcKeys = ['svc1','svc2','svc3','svc4','svc5'];
  document.getElementById('services-grid').innerHTML = svcKeys.map((k,i) => `
    <div class="service-card">
      <div class="svc-icon">${serviceIcons[i]}</div>
      <h3>${t(k+'_name')}</h3>
      <p>${t(k+'_desc')}</p>
      <div class="svc-price">${t(k+'_price')}</div>
    </div>
  `).join('');

  // Booking form labels
  document.getElementById('sec-book-label').textContent = t('book_label');
  document.getElementById('sec-book-title').textContent = t('book_title');
  document.getElementById('sec-book-sub').textContent   = t('book_sub');
  document.getElementById('lbl-fname').textContent    = t('f_fname');
  document.getElementById('lbl-lname').textContent    = t('f_lname');
  document.getElementById('lbl-phone').textContent    = t('f_phone');
  document.getElementById('lbl-email').textContent    = t('f_email');
  document.getElementById('lbl-type').textContent     = t('f_type');
  document.getElementById('lbl-date').textContent     = t('f_date');
  document.getElementById('lbl-location').textContent = t('f_location');
  document.getElementById('lbl-guests').textContent   = t('f_guests');
  document.getElementById('lbl-note').textContent     = t('f_note');
  document.getElementById('f-submit').textContent     = t('f_submit');
  document.getElementById('f-fname').placeholder      = t('f_fname');
  document.getElementById('f-lname').placeholder      = t('f_lname');
  document.getElementById('f-guests').placeholder     = t('f_guests_ph');
  document.getElementById('f-note').placeholder       = t('f_note_ph');

  // Booking dropdowns
  const typeSelect = document.getElementById('f-type');
  typeSelect.innerHTML = `<option value="">${t('f_type_ph')}</option>` +
    eventTypes[currentLang].map(e => `<option value="${e}">${e}</option>`).join('');

  const locSelect = document.getElementById('f-location');
  locSelect.innerHTML = `<option value="">${t('f_location_ph')}</option>` +
    locations.map(l => `<option value="${currentLang==='am'?l.name_am:l.name_en}">${currentLang==='am'?l.name_am:l.name_en}</option>`).join('');

  // Booking info boxes
  document.getElementById('info-title').textContent = t('info_title');
  document.getElementById('info-items').innerHTML = `
    <div class="info-item"><div class="info-icon">⚡</div><div><h4>${t('info1_t')}</h4><p>${t('info1_p')}</p></div></div>
    <div class="info-item"><div class="info-icon">🎯</div><div><h4>${t('info2_t')}</h4><p>${t('info2_p')}</p></div></div>
    <div class="info-item"><div class="info-icon">💰</div><div><h4>${t('info3_t')}</h4><p>${t('info3_p')}</p></div></div>
    <div class="info-item"><div class="info-icon">📍</div><div><h4>${t('info4_t')}</h4><p>${t('info4_p')}</p></div></div>
  `;

  // Packages
  document.getElementById('sec-pkg-label').textContent = t('pkg_label');
  document.getElementById('sec-pkg-title').textContent = t('pkg_title');
  document.getElementById('sec-pkg-sub').textContent   = t('pkg_sub');
  const pkgs = [
    { key:'pkg1', featured: false },
    { key:'pkg2', featured: true  },
    { key:'pkg3', featured: false },
  ];
  document.getElementById('packages-grid').innerHTML = pkgs.map(({key, featured}) => `
    <div class="package-card ${featured?'featured':''}">
      <div class="pkg-header">
        ${featured ? `<div class="pkg-badge">⭐ ${currentLang==='am'?'ተወዳጅ':'Popular'}</div>` : ''}
        <div class="pkg-name">${t(key+'_name')}</div>
        <div class="pkg-price"><span class="pkg-price-from">${t(key+'_from')} </span>${t(key+'_price')}</div>
      </div>
      <div class="pkg-body">
        <ul>${(translations[currentLang][key+'_features']||[]).map(f=>`<li>${f}</li>`).join('')}</ul>
      </div>
      <div class="pkg-footer">
        <a href="#booking"><button class="btn btn-primary btn-full">${t('pkg_btn')}</button></a>
      </div>
    </div>
  `).join('');

  // Gallery
  document.getElementById('sec-gal-label').textContent = t('gallery_label');
  document.getElementById('sec-gal-title').textContent = t('gallery_title');
  document.getElementById('sec-gal-sub').textContent   = t('gallery_sub');
  document.getElementById('gallery-grid').innerHTML = gallery.map(g => `
    <div class="gallery-item">
      <img src="${g.img}" alt="${currentLang==='am'?g.label_am:g.label_en}" loading="lazy"/>
      <div class="gallery-overlay"><span>${currentLang==='am'?g.label_am:g.label_en}</span></div>
    </div>
  `).join('');

  // Locations
  document.getElementById('sec-loc-label').textContent = t('loc_label');
  document.getElementById('sec-loc-title').textContent = t('loc_title');
  document.getElementById('sec-loc-sub').textContent   = t('loc_sub');
  document.getElementById('locations-grid').innerHTML = locations.map(l => `
    <div class="location-chip">
      <div class="loc-icon">${l.icon}</div>
      <div class="loc-name">${currentLang==='am'?l.name_am:l.name_en}</div>
      <div class="loc-region">${currentLang==='am'?l.region_am:l.region_en}</div>
    </div>
  `).join('');

  // Contact
  document.getElementById('sec-con-label').textContent   = t('contact_label');
  document.getElementById('sec-con-title').textContent   = t('contact_title');
  document.getElementById('sec-con-sub').textContent     = t('contact_sub');
  document.getElementById('c-lbl-name').textContent      = t('c_name');
  document.getElementById('c-lbl-phone').textContent     = t('c_phone');
  document.getElementById('c-lbl-subject').textContent   = t('c_subject');
  document.getElementById('c-lbl-msg').textContent       = t('c_msg');
  document.getElementById('c-send').textContent          = t('c_send');
  document.getElementById('c-info-title').textContent    = t('c_info_title');
  document.getElementById('c-hours').textContent         =
    currentLang === 'am' ? 'ሰኞ–ቅዳሜ: 8:00–6:00 ምሽት' : 'Mon–Sat: 8:00 AM – 6:00 PM';

  // Footer
  document.getElementById('footer-copy').textContent = t('footer_copy');

  // Set document language direction
  document.documentElement.lang = currentLang;
}

// ============================================================
// FORM HANDLERS
// ============================================================
function submitBooking() {
  const fname = document.getElementById('f-fname').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const type  = document.getElementById('f-type').value;
  const date  = document.getElementById('f-date').value;
  if (!fname || !phone || !type || !date) { showToast(t('toast_error')); return; }
  showToast(t('toast_book'));
  ['f-fname','f-lname','f-phone','f-email','f-guests','f-note'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-type').selectedIndex = 0;
  document.getElementById('f-location').selectedIndex = 0;
  document.getElementById('f-date').value = '';
}

function submitContact() {
  const name  = document.getElementById('c-name').value.trim();
  const phone = document.getElementById('c-phone').value.trim();
  const msg   = document.getElementById('c-msg').value.trim();
  if (!name || !phone || !msg) { showToast(t('toast_error')); return; }
  showToast(t('toast_contact'));
  ['c-name','c-phone','c-subject','c-msg'].forEach(id => document.getElementById(id).value = '');
}

// ============================================================
// INIT
// ============================================================
renderAll();
</script>
</body>
</html>
<!-- API Integration: connects forms to the Node.js backend -->
<script>
// Override submitBooking to POST to our real server
async function submitBooking() {
  const fname = document.getElementById('f-fname').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const type  = document.getElementById('f-type').value;
  const date  = document.getElementById('f-date').value;
  if (!fname || !phone || !type || !date) { showToast(t('toast_error')); return; }

  const btn = document.getElementById('f-submit');
  btn.textContent = currentLang === 'am' ? 'እየተላኩ ነው...' : 'Sending...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/bookings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        fname,
        lname:     document.getElementById('f-lname').value.trim(),
        phone,
        email:     document.getElementById('f-email').value.trim(),
        eventType: type,
        eventDate: date,
        location:  document.getElementById('f-location').value,
        guests:    document.getElementById('f-guests').value,
        note:      document.getElementById('f-note').value.trim(),
      })
    });

    const data = await res.json();
    if (data.success) {
      showToast(t('toast_book'));
      ['f-fname','f-lname','f-phone','f-email','f-guests','f-note'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('f-type').selectedIndex = 0;
      document.getElementById('f-location').selectedIndex = 0;
      document.getElementById('f-date').value = '';
    } else {
      showToast('⚠️ Error: ' + (data.message || 'Please try again.'));
    }
  } catch (err) {
    // If server not running, fall back to demo mode
    showToast(t('toast_book') + ' (Demo mode)');
  }

  btn.textContent = t('f_submit');
  btn.disabled = false;
}

// Override submitContact to POST to server
async function submitContact() {
  const name  = document.getElementById('c-name').value.trim();
  const phone = document.getElementById('c-phone').value.trim();
  const msg   = document.getElementById('c-msg').value.trim();
  if (!name || !phone || !msg) { showToast(t('toast_error')); return; }

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name, phone,
        subject: document.getElementById('c-subject').value.trim(),
        message: msg
      })
    });
    const data = await res.json();
    if (data.success) {
      showToast(t('toast_contact'));
      ['c-name','c-phone','c-subject','c-msg'].forEach(id => document.getElementById(id).value = '');
    }
  } catch {
    showToast(t('toast_contact') + ' (Demo mode)');
    ['c-name','c-phone','c-subject','c-msg'].forEach(id => document.getElementById(id).value = '');
  }
}
</script>
